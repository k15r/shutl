name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO: ${{ github.repository }}

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    name: Bump Version and Create PR
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump Version
        id: bump_version
        run: |
          current=$(grep '^version' Cargo.toml | cut -d '"' -f 2)
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_version="${major}.${minor}.${patch}"
          sed -i "s/^version = \"${current}\"/version = \"${new_version}\"/" Cargo.toml
          echo "version=${new_version}" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        run: |
          branch="release-v${{ steps.bump_version.outputs.version }}"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git checkout -b "$branch"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }}"
          git push origin "$branch"
          gh pr create \
            --title "chore: release ${{ steps.bump_version.outputs.version }}" \
            --body "Bump version to ${{ steps.bump_version.outputs.version }} (${{ inputs.bump }})" \
            --base main \
            --head "$branch"

  create-release:
    name: Create Tag and Draft Release
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - uses: actions/checkout@v6
        with:
          ref: release-v${{ needs.bump-version.outputs.version }}

      - name: Tag the Repository
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -a "v${{ needs.bump-version.outputs.version }}" -m "Release v${{ needs.bump-version.outputs.version }}"
          git push origin "v${{ needs.bump-version.outputs.version }}"

      - name: Create GitHub Draft Release
        run: |
          gh release create v${{ needs.bump-version.outputs.version }} \
            --title "Release v${{ needs.bump-version.outputs.version }}" \
            --generate-notes \
            --draft \
            --prerelease

  build-and-upload:
    name: Build and Upload Artifacts
    runs-on: ${{ matrix.os }}
    needs:
      - bump-version
      - create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: shutl
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            artifact_name: shutl
            target: x86_64-apple-darwin
          - os: macos-latest
            artifact_name: shutl
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.bump-version.outputs.version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Create Release Archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ github.workspace }}/${{ matrix.target }}.tar.gz ${{ matrix.artifact_name }}
          cd ../../..

      - name: Upload Release Artifact
        run: |
          gh release upload v${{ needs.bump-version.outputs.version }} \
          --clobber \
          ${{ github.workspace }}/${{ matrix.target }}.tar.gz

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-and-upload
      - bump-version
    steps:
      - name: Publish Release
        run: |
          gh release edit v${{ needs.bump-version.outputs.version }} \
            --draft=false \
            --prerelease=false
